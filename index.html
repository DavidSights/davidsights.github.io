<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover"
  />
  <meta name="theme-color" content="#e0dbd2" />
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png" />
  <link rel="icon" type="image/png" href="favicon.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png" />
  <title>Faint Sense</title>
  <meta
    name="description"
    content="Faint Sense carefully crafts software for the future."
  />
  <style>
    :root {
      --bg: #e0dbd2;
      --ink: #2d2d2d;
      --muted: #3c3c3c;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
      background-color: var(--bg);
    }

    body {
      margin: 0;
      color: var(--ink);
      font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
      background-color: var(--bg);
    }

    main {
      min-height: 100dvh;
      padding:
        max(clamp(2rem, 4vw, 3rem), env(safe-area-inset-top))
        1.5rem
        max(clamp(2rem, 4vw, 3rem), env(safe-area-inset-bottom));
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      text-align: center;
    }

    .brand {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.85rem;
      padding-top: clamp(1rem, 3vh, 2rem);
    }

    .brand-mark {
      width: clamp(72px, 7.5vw, 108px);
      height: auto;
      display: block;
    }

    .brand-name {
      margin: 0;
      padding-left: 0.24em;
      font-size: clamp(2rem, 3vw, 3rem);
      font-weight: 600;
      letter-spacing: 0.24em;
      text-transform: uppercase;
      line-height: 1;
    }

    .message {
      margin: 0;
      padding: 0 1rem;
      font-size: clamp(1.8rem, 3.2vw, 3rem);
      font-weight: 400;
      line-height: 1.2;
      color: var(--muted);
      opacity: 0;
      transition: opacity 900ms ease;
    }

    .message.is-visible {
      opacity: 1;
    }

    .message-group {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.9rem;
    }

    .message-subtext {
      margin: 0;
      padding: 0 1rem;
      font-size: clamp(0.95rem, 1.4vw, 1.1rem);
      line-height: 1.4;
      color: rgba(60, 60, 60, 0.8);
    }

    .contact {
      color: var(--muted);
      text-decoration: none;
      font-size: clamp(1.1rem, 1.7vw, 1.45rem);
      line-height: 1.3;
      transition: opacity 160ms ease;
    }

    .contact:hover,
    .contact:focus-visible {
      opacity: 0.7;
    }

    @media (max-width: 640px) {
      main {
        padding:
          max(1.25rem, env(safe-area-inset-top))
          1rem
          max(1.25rem, env(safe-area-inset-bottom));
      }

      .brand {
        gap: 0.7rem;
      }

      .brand-mark {
        width: clamp(36px, 6vw, 54px);
      }

      .brand-name {
        font-size: clamp(1rem, 4.4vw, 1.5rem);
        letter-spacing: 0.18em;
        padding-left: 0.18em;
      }
    }
  </style>
</head>
<body>
  <main>
    <header class="brand" aria-label="Faint Sense">
      <img
        class="brand-mark"
        src="faint-sense-logo.svg"
        alt="Faint Sense logo"
        width="108"
        height="108"
        fetchpriority="high"
      />
      <h1 class="brand-name">Faint Sense</h1>
    </header>

    <div class="message-group">
      <p class="message" id="message">Following intuitions</p>
      <p class="message-subtext">New release coming. Check back soon.</p>
    </div>

    <a class="contact" href="mailto:hello@faintsense.com">hello@faintsense.com</a>
  </main>
  <script>
    const messages = [
      "Crafting software for the future",
      "Cooking up fresh concepts",
      "Bringing ideas to life",
      "Trying something new",
      "Building what comes next",
      "Shaping ideas into reality",
      "Making useful things happen",
      "Designing for what's ahead",
      "Turning thoughts into motion",
      "Building from curiosity",
      "Working on what could be",
      "Following intuitions"
    ];

    const messageElement = document.getElementById("message");
    const fadeDuration = 900;
    const visibleDuration = 3000;
    let messageQueue = [];
    let currentIndex = 0;

    function shuffle(items) {
      const nextItems = [...items];

      for (let index = nextItems.length - 1; index > 0; index -= 1) {
        const randomIndex = Math.floor(Math.random() * (index + 1));
        const temp = nextItems[index];
        nextItems[index] = nextItems[randomIndex];
        nextItems[randomIndex] = temp;
      }

      return nextItems;
    }

    function getNextMessage() {
      if (messageQueue.length === 0 || currentIndex >= messageQueue.length) {
        messageQueue = shuffle(messages);
        currentIndex = 0;
      }

      const nextMessage = messageQueue[currentIndex];
      currentIndex += 1;
      return nextMessage;
    }

    function cycleMessages() {
      if (!messageElement) {
        return;
      }

      messageElement.classList.remove("is-visible");

      window.setTimeout(() => {
        messageElement.textContent = getNextMessage();
        messageElement.classList.add("is-visible");

        window.setTimeout(() => {
          messageElement.classList.remove("is-visible");

          window.setTimeout(cycleMessages, fadeDuration);
        }, visibleDuration);
      }, fadeDuration);
    }

    if (messageElement) {
      messageQueue = shuffle(messages);
      messageElement.textContent = getNextMessage();
      requestAnimationFrame(() => {
        messageElement.classList.add("is-visible");
      });

      window.setTimeout(() => {
        messageElement.classList.remove("is-visible");
        window.setTimeout(cycleMessages, fadeDuration);
      }, visibleDuration);
    }
  </script>
</body>
</html>
