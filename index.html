<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover"
  />
  <title>Faint Sense</title>
  <meta
    name="description"
    content="Faint Sense carefully crafts software for the future."
  />
  <style>
    :root {
      --bg: #e0dbd2;
      --glow: rgba(255, 255, 255, 0.94);
      --ink: #2d2d2d;
      --muted: #3c3c3c;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
      background-color: var(--bg);
    }

    body {
      margin: 0;
      color: var(--ink);
      font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
      background-color: var(--bg);
      background-image:
        radial-gradient(circle at 50% 10%, var(--glow) 0, rgba(255, 255, 255, 0.84) 12%, rgba(255, 255, 255, 0) 34%),
        radial-gradient(circle at 15% 30%, rgba(255, 255, 255, 0.78) 0, rgba(255, 255, 255, 0) 30%),
        radial-gradient(circle at 85% 32%, rgba(255, 255, 255, 0.78) 0, rgba(255, 255, 255, 0) 28%),
        radial-gradient(circle at 50% 58%, rgba(255, 255, 255, 0.64) 0, rgba(255, 255, 255, 0) 34%),
        linear-gradient(180deg, #ede8de 0%, #cbc4b8 100%);
      background-attachment: fixed;
    }

    main {
      min-height: 100dvh;
      padding:
        max(clamp(2rem, 4vw, 3rem), env(safe-area-inset-top))
        1.5rem
        max(clamp(2rem, 4vw, 3rem), env(safe-area-inset-bottom));
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      text-align: center;
    }

    .brand {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.85rem;
      padding-top: clamp(1rem, 3vh, 2rem);
    }

    .brand-mark {
      width: clamp(72px, 7.5vw, 108px);
      height: auto;
      display: block;
    }

    .brand-name {
      margin: 0;
      padding-left: 0.24em;
      font-size: clamp(2rem, 3vw, 3rem);
      font-weight: 600;
      letter-spacing: 0.24em;
      text-transform: uppercase;
      line-height: 1;
    }

    .message {
      margin: 0;
      padding: 0 1rem;
      font-size: clamp(1.8rem, 3.2vw, 3rem);
      font-weight: 400;
      line-height: 1.2;
      color: var(--muted);
    }

    .contact {
      color: var(--muted);
      text-decoration: none;
      font-size: clamp(1.1rem, 1.7vw, 1.45rem);
      line-height: 1.3;
      transition: opacity 160ms ease;
    }

    .contact:hover,
    .contact:focus-visible {
      opacity: 0.7;
    }

    @media (max-width: 640px) {
      main {
        padding:
          max(1.25rem, env(safe-area-inset-top))
          1rem
          max(1.25rem, env(safe-area-inset-bottom));
      }

      .brand {
        gap: 0.7rem;
      }

      .brand-mark {
        width: clamp(36px, 6vw, 54px);
      }

      .brand-name {
        font-size: clamp(1rem, 4.4vw, 1.5rem);
        letter-spacing: 0.18em;
        padding-left: 0.18em;
      }
    }
  </style>
</head>
<body>
  <main>
    <header class="brand" aria-label="Faint Sense">
      <img
        class="brand-mark"
        src="faint-sense-logo.svg"
        alt="Faint Sense logo"
        width="108"
        height="108"
        fetchpriority="high"
      />
      <h1 class="brand-name">Faint Sense</h1>
    </header>

    <p class="message" id="message">Following intuitions</p>

    <a class="contact" href="mailto:hello@faintsense.com">hello@faintsense.com</a>
  </main>
  <script>
    const messages = [
      "Crafting software for the future",
      "Cooking up fresh concepts",
      "Bringing ideas to life",
      "Trying something new",
      "Building what comes next",
      "Shaping ideas into reality",
      "Making useful things happen",
      "Designing for what's ahead",
      "Turning thoughts into motion",
      "Building from curiosity",
      "Working on what could be",
      "Following intuitions"
    ];

    const messageElement = document.getElementById("message");
    const randomMessage = messages[Math.floor(Math.random() * messages.length)];

    if (messageElement) {
      messageElement.textContent = randomMessage;
    }
  </script>
</body>
</html>
